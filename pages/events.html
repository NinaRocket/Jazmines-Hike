<head>

  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.10.2/main.min.css" rel="stylesheet">

  <!-- Scripts -->
  <script src="/components/header.js" defer></script>
  <script src="/components/footer.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.10.2/main.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/luxon@2.3.0/build/global/luxon.min.js"></script>
  <script src="/js/renderEvents.js" defer></script>

<body>
  <header-component></header-component>

  <main class="container mt-5">
    <h1 style="text-align:center;">Upcoming Events</h1>
    <p style="text-align:center;">All the latest and upcoming events hosted by Jazmine's Journey.</p>

    <!-- Calendar container -->
    <div id="calendar" style="margin: 50px auto; width: 90%;"></div>

    <!-- Event section container -->
    <div id="event-details-container"></div>
  </main>

  <footer-component></footer-component>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

<style>
  /* 🎨 IMAGE STYLING */
  .fc-event-img {
    text-align: center;
  }

  .fc-event-img img,
  .smallImg img {
    max-height: 40px;
    margin-left: 10px;
    max-width: 60px;
  }

  /* 🧢 EVENT TITLE */
  .fc-event-title {
    font-weight: 500;
    font-size: 1rem;
    padding-left: 10px;
  }

  .fc-event-title.fc-sticky {
    display: inline-block;
    vertical-align: middle;
  }

  /* 🧭 HEADER TOOLBAR */
  .fc .fc-toolbar-title {
    font-size: 2rem;
    color: #ec8235; /* jazzy orange 💛 */
  }

  .fc-prev-button,
  .fc-next-button,
  .fc-today-button {
    display: none !important;
  }

  /* 📅 LIST VIEW HEADER (DATE GROUPS) */
  .fc-theme-standard .fc-list-day-cushion {
    background-color: #dfeaed !important;
    padding: 8px;
    font-weight: bold;
  }

  /* 📋 LIST TABLE WRAPPER */
  .fc-theme-standard .fc-list {
    border: 1px solid #ddd;
    box-shadow: none;
  }

  /* 📱 MOBILE STYLES */

   /* Fix the FC List view event row layout on mobile */
@media (max-width: 600px) {
  .fc .fc-list-event-title {
    font-size: 16px;
    white-space: normal !important;
  }

  .fc-event-title.fc-sticky {
    display: block;
    width: 100%;
    text-align: center;
    margin-bottom: 5px;
  }

  .fc-event-time {
    display: block !important;
    width: 100% !important;
    white-space: normal !important;
    font-size: 14px;
    text-align: center;
    margin-bottom: 5px;
  }

  .fc-list-event td {
    display: block;
    width: 100% !important;
    box-sizing: border-box;
    text-align: center;
  }

  .fc-event-img {
    display: block;
    margin: 10px auto 0;
  }

  .fc-event-img img {
    display: block;
    margin: 0 auto;
    height: 40px;
    max-width: 60px;
  }

  .fc .fc-list-event {
    flex-wrap: wrap;
    justify-content: center;
    border-bottom: 1px solid #ccc; 
  }
  .fc-list-event-graphic{
    display: none !important;
  }
  .fc-list-event-time {
  border-right: none !important;
}
.fc-theme-standard td{
    border: none !important;
}
}
