   /* Fix the FC List view event row layout on mobile */
@media (max-width: 600px) {
  .fc .fc-list-event-title {
    font-size: 16px;
    white-space: normal !important;
  }
.fc-scroller{
  height: 300px;
    overflow: scroll !important;
}
  .fc-event-title.fc-sticky {
    display: block;
    width: 100%;
    text-align: center;
    margin-bottom: 5px;
  }

  .fc-event-time {
    display: block !important;
    width: 100% !important;
    white-space: normal !important;
    font-size: 14px;
    text-align: center;
    margin-bottom: 5px;
  }

  .fc-list-event td {
    display: block;
    width: 100% !important;
    box-sizing: border-box;
    text-align: center;
  }

  .fc-event-img {
    display: block;
    margin: 10px auto 0;
  }

  .fc-event-img img {
    display: block;
    margin: 0 auto;
    height: 40px;
    max-width: 60px;
  }

  .fc .fc-list-event {
    flex-wrap: wrap;
    justify-content: center;
    border-bottom: 1px solid #ccc; 
  }
  .fc-list-event-graphic{
    display: none !important;
  }
  .fc-list-event-time {
  border-right: none !important;
}
.fc-theme-standard td{
    border: none !important;
}
}

/* --- Make FullCalendar list look like the old one --- */
#calendar { width: 50%; margin: 0 auto; }              /* same width feel as old page */
.fc .fc-list-event-graphic { display: none !important; }/* hide left dot column */

.fc .fc-list-day-cushion {
  background-color: #dfeaed !important;
  padding: 8px;
  font-weight: bold;
}

.fc .fc-list-event-time {
  text-align: left;
  vertical-align: middle;
  width: 160px;                 /* gives you that narrow Time column */
  padding: 8px 14px;
  white-space: normal;          /* allow the time to wrap to 2 lines if needed */
}

.fc .fc-list-event-title {
  vertical-align: middle;
  padding: 8px 14px;
}

/* title cell contains the link (we render it ourselves) */
.fc .fc-list-event-title a {
  display: flex;
  align-items: center;
  text-decoration: underline;      
}

/* keep img small and aligned */
.fc-event-img { text-align: right; }
.fc-event-img img { max-height: 40px; max-width: 60px; }

/* mobile: full width like before */
@media (max-width: 600px) {
  #calendar { width: 100%; }
}
